<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI Studio</title>
  <link rel="icon" type="image/svg+xml" href="img/logo.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3 d-flex gap-3 align-items-center">
    <a class="navbar-brand d-flex align-items-center gap-2 me-0" href="/" onclick="App.showProjects(); return false;">
      <svg width="22" height="22" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g stroke="rgba(255,255,255,0.25)" stroke-width="3" fill="none" stroke-linecap="round">
          <line x1="16" y1="16" x2="48" y2="16"/>
          <line x1="16" y1="16" x2="16" y2="48"/>
          <line x1="48" y1="16" x2="48" y2="48"/>
          <line x1="16" y1="48" x2="48" y2="48"/>
        </g>
        <circle cx="16" cy="16" r="5" fill="#5b6af0"/>
        <circle cx="48" cy="16" r="5" fill="#5b6af0"/>
        <circle cx="16" cy="48" r="5" fill="#5b6af0"/>
        <circle cx="48" cy="48" r="5" fill="#5b6af0"/>
      </svg>
      <span>BI Studio</span>
    </a>
    <span id="breadcrumb" class="text-secondary small flex-grow-1 ms-1"></span>
    <nav class="d-flex gap-1">
      <button class="nav-btn" id="nav-home"       onclick="App.showProjects()">Home</button>
      <button class="nav-btn" id="nav-components" onclick="App.showComponents()" disabled>Components</button>
      <button class="nav-btn" id="nav-dashboard"  onclick="App.showDashboard()"  disabled>Dashboards</button>
    </nav>
  </nav>

  <div class="app-body">

    <!-- ── View 1: Projects ──────────────────────────────────────── -->
    <div id="view-projects" class="view">
      <div class="centered-form">
        <h5 class="mb-3">Projects</h5>
        <div id="project-list" class="mb-3"></div>
        <div class="input-group">
          <input id="new-project-name" type="text" class="form-control" placeholder="New project name…"
                 onkeydown="if(event.key==='Enter') App.createProject()" />
          <button class="btn btn-primary" onclick="App.createProject()">Create</button>
        </div>
      </div>
    </div>

    <!-- ── View 2: Component list ────────────────────────────────── -->
    <div id="view-component-list" class="view d-none">
      <div class="centered-form">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">Components</h5>
          <button class="btn btn-primary btn-sm" onclick="ComponentList.showCreateModal()">+ New component</button>
        </div>
        <div id="component-list-items"></div>
      </div>
    </div>

    <!-- ── View 2b: Dashboard list ──────────────────────────────── -->
    <div id="view-dashboard-list" class="view d-none">
      <div class="centered-form">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">Dashboards</h5>
          <button class="btn btn-primary btn-sm" onclick="Dashboard.showCreateModal()">+ New dashboard</button>
        </div>
        <div id="dashboard-list-items"></div>
      </div>
    </div>

    <!-- ── View 3: Workspace ─────────────────────────────────────── -->
    <div id="view-workspace" class="view d-none workspace-layout">

      <!-- Left: chat -->
      <div class="ws-chat d-flex flex-column border-end">
        <div class="ws-chat-header p-2 border-bottom d-flex align-items-center gap-2">
          <span id="ws-component-type" class="component-badge"></span>
          <span id="ws-component-name" class="fw-semibold small"></span>
        </div>
        <div id="chat-messages" class="flex-grow-1 p-3 overflow-auto"></div>
        <div class="ws-chat-input-row border-top p-2 d-flex gap-2">
          <input id="chat-input" type="text" class="form-control form-control-sm"
                 placeholder="Describe what to build or change…" />
          <button class="btn btn-primary btn-sm" onclick="Chat.send()">Send</button>
        </div>
      </div>

      <!-- Right: editor + run results -->
      <div class="ws-editor d-flex flex-column">
        <div class="ws-editor-toolbar border-bottom p-2 d-flex gap-2 align-items-center">
          <span class="text-secondary small me-auto">Code / Config</span>
          <button id="btn-save" class="btn btn-sm btn-outline-secondary" onclick="Workspace.save()">Save</button>
          <button id="btn-run" class="btn btn-sm btn-success" onclick="Workspace.run()">▶ Run</button>
        </div>
        <div id="monaco-editor" class="flex-grow-1"></div>
        <div id="run-result" class="run-result overflow-auto p-2 border-top"></div>
      </div>

    </div>

    <!-- ── View 4: Dashboard ─────────────────────────────────────── -->
    <div id="view-dashboard" class="view d-none d-flex flex-column">
      <div class="dashboard-toolbar border-bottom px-3 py-2 d-flex align-items-center gap-2 bg-white flex-shrink-0">
        <span class="fw-semibold me-auto" id="dashboard-title">Dashboard</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="Dashboard.renamePrompt()">Rename</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="Dashboard.addChart()">+ Add chart</button>
        <button class="btn btn-sm btn-outline-danger" onclick="Dashboard.deleteCurrentDashboard()">Delete</button>
      </div>
      <div id="dashboard-grid" class="dashboard-grid p-3"></div>
    </div>

  </div><!-- /app-body -->

  <!-- Create component modal (2-step wizard) -->
  <div class="modal fade" id="create-component-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h6 class="modal-title" id="create-modal-title">New component</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

          <!-- Step 1: type selection -->
          <div id="wizard-step-1">
            <p class="text-secondary small mb-3">What kind of component do you want to build?</p>
            <div class="d-flex gap-3">
              <div class="type-card flex-fill" onclick="ComponentList.selectType('etl')">
                <div class="type-card-icon">⚙️</div>
                <div class="fw-semibold">ETL</div>
                <div class="text-secondary small mt-1">Connect, transform &amp; load data</div>
              </div>
              <div class="type-card flex-fill" onclick="ComponentList.selectType('visualisation')">
                <div class="type-card-icon">📊</div>
                <div class="fw-semibold">Visualisation</div>
                <div class="text-secondary small mt-1">Charts &amp; plots from your data</div>
              </div>
            </div>
          </div>

          <!-- Step 2: name input -->
          <div id="wizard-step-2" class="d-none">
            <p class="text-secondary small mb-3">
              Give your <strong id="wizard-type-label"></strong> component a name.
            </p>
            <input id="new-component-name" type="text" class="form-control" autofocus
                   placeholder="e.g. sales_pipeline"
                   onkeydown="if(event.key==='Enter') ComponentList.createComponent()" />
            <input type="hidden" id="new-component-type" />
          </div>

        </div>
        <div class="modal-footer border-0 pt-0" id="wizard-footer">
          <!-- populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
  <!-- Monaco loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/workspace.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
