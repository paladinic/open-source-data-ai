<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI Studio — Setup</title>
  <link rel="icon" type="image/svg+xml" href="img/logo.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .setup-card {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    }

    .setup-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .setup-logo span {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .setup-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 4px;
    }

    #setup-error {
      display: none;
    }

    #setup-success {
      display: none;
    }
  </style>
</head>

<body>
  <div class="setup-card">
    <div class="setup-logo">
      <!-- Inline logo — same as navbar, but larger -->
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round">
          <line x1="16" y1="16" x2="48" y2="16" />
          <line x1="16" y1="16" x2="16" y2="48" />
          <line x1="48" y1="16" x2="48" y2="48" />
          <line x1="16" y1="48" x2="48" y2="48" />
        </g>
        <circle cx="16" cy="16" r="5" fill="#000" />
        <circle cx="48" cy="16" r="5" fill="#000" />
        <circle cx="16" cy="48" r="5" fill="#000" />
        <circle cx="48" cy="48" r="5" fill="#000" />
      </svg>
      <span>BI Studio</span>
      <span class="setup-badge">First-time setup</span>
    </div>

    <h5 class="mb-1">Create admin account</h5>
    <p class="text-secondary small mb-4">
      No users exist yet. Create the first admin account to get started.
      This page is disabled once an admin is created.
    </p>

    <div id="setup-error" class="alert alert-danger py-2 small mb-3"></div>
    <div id="setup-success" class="alert alert-success py-2 small mb-3">
      Admin account created. <a href="/" class="alert-link">Go to app →</a>
    </div>

    <form id="setup-form" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="setup-email">Email</label>
        <input id="setup-email" type="email" class="form-control" placeholder="admin@example.com" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="setup-password">Password</label>
        <input id="setup-password" type="password" class="form-control" placeholder="Min 8 characters" required minlength="8" />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="setup-password2">Confirm password</label>
        <input id="setup-password2" type="password" class="form-control" placeholder="Repeat password" required />
      </div>
      <button id="setup-btn" type="submit" class="btn btn-primary w-100">Create admin account</button>
    </form>
  </div>

  <script>
    // If bootstrap is no longer needed, send the user straight to the app.
    fetch('/api/auth/bootstrap/needed')
      .then(r => r.json())
      .then(data => {
        if (!data.needed) window.location.replace('/');
      })
      .catch(() => {}); // network error — let the form handle it

    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('setup-email').value.trim();
      const password = document.getElementById('setup-password').value;
      const password2 = document.getElementById('setup-password2').value;
      const errEl = document.getElementById('setup-error');
      const successEl = document.getElementById('setup-success');
      const btn = document.getElementById('setup-btn');

      errEl.style.display = 'none';
      successEl.style.display = 'none';

      if (password !== password2) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating…';

      try {
        const res = await fetch('/api/auth/bootstrap', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email,
            password
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || 'Bootstrap failed.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create admin account';
          return;
        }
        successEl.style.display = 'block';
        document.getElementById('setup-form').style.display = 'none';
      } catch (err) {
        errEl.textContent = 'Network error. Is the backend running?';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create admin account';
      }
    });
  </script>
</body>

</html>
