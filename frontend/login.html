<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI Studio — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="img/logo_bg.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .setup-card {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    }

    .setup-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .setup-logo span {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #login-error { display: none; }
  </style>
</head>

<body>
  <div class="setup-card">
    <div class="setup-logo">
      <img src="img/full_logo.svg" class="mx-auto" alt="bi studio logo">
    </div>

    <h5 class="mb-1">Sign in</h5>
    <p class="text-secondary small mb-4">Enter your credentials to access the app.</p>

    <div id="login-error" class="alert alert-danger py-2 small mb-3"></div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="login-email">Email</label>
        <input id="login-email" type="email" class="form-control" placeholder="you@example.com" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="login-password">Password</label>
        <input id="login-password" type="password" class="form-control" placeholder="Password" required />
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="show-password" onchange="togglePwd(this.checked)" />
        <label class="form-check-label small" for="show-password">Show password</label>
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
  </div>

  <script>
    function togglePwd(show) {
      document.getElementById('login-password').type = show ? 'text' : 'password';
    }

    // If already logged in, skip to the app.
    if (localStorage.getItem('auth_token')) {
      window.location.replace('/');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || 'Login failed.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        window.location.replace('/');
      } catch (err) {
        errEl.textContent = 'Network error. Is the backend running?';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>

</html>
