<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI Studio - Sign in</title>
  <link rel="icon" type="image/svg+xml" href="img/logo_bg.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script>try{var t=localStorage.getItem('bi-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(_){}</script>
  <style>
    .setup-card {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    }

    .setup-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .setup-logo span {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #login-error { display: none; }

    .oauth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #adb5bd;
      font-size: 0.8rem;
    }
    .oauth-divider::before, .oauth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="setup-card">
    <div class="setup-logo">
      <img src="img/full_logo.svg" class="mx-auto" alt="BI studio logo">
    </div>

    <h5 class="mb-1">Sign in</h5>
    <p class="text-secondary small mb-4">Enter your credentials to access the app.</p>

    <div id="login-error" class="alert alert-danger py-2 small mb-3"></div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="login-email">Email</label>
        <input id="login-email" type="email" class="form-control" placeholder="you@example.com" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="login-password">Password</label>
        <input id="login-password" type="password" class="form-control" placeholder="Password" required />
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="show-password" onchange="togglePwd(this.checked)" />
        <label class="form-check-label small" for="show-password">Show password</label>
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>

    <div id="oauth-section">
    <div class="oauth-divider my-4">
      <span>or continue with</span>
    </div>

    <div class="d-flex flex-column gap-2">
      <button class="btn btn-outline-secondary w-100 oauth-btn" onclick="signInWithProvider('google')">
        <svg width="18" height="18" viewBox="0 0 24 24" class="me-2"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn btn-outline-secondary w-100 oauth-btn" onclick="signInWithProvider('github')">
        <svg width="18" height="18" viewBox="0 0 24 24" class="me-2"><path fill="currentColor" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </button>
      <button class="btn btn-outline-secondary w-100 oauth-btn" onclick="signInWithProvider('azure')">
        <svg width="18" height="18" viewBox="0 0 24 24" class="me-2"><path fill="#00a4ef" d="M0 0h11.5v11.5H0zm12.5 0H24v11.5H12.5zM0 12.5h11.5V24H0zm12.5 0H24V24H12.5z"/></svg>
        Microsoft
      </button>
    </div>
    </div><!-- /oauth-section -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    function togglePwd(show) {
      document.getElementById('login-password').type = show ? 'text' : 'password';
    }

    let _supabaseConfig = null;

    async function _getSupabaseClient() {
      if (!_supabaseConfig) {
        const res = await fetch('/api/auth/config');
        _supabaseConfig = await res.json();
      }
      if (!_supabaseConfig.supabase_url || !_supabaseConfig.supabase_anon_key) return null;
      return supabase.createClient(_supabaseConfig.supabase_url, _supabaseConfig.supabase_anon_key);
    }

    async function _initOAuth() {
      // Hide OAuth section if not configured
      try {
        const client = await _getSupabaseClient();
        if (!client) {
          document.getElementById('oauth-section').style.display = 'none';
          return;
        }
        // Handle OAuth callback - Supabase redirects back here with #access_token in the hash
        if (window.location.hash.includes('access_token')) {
          const { data: { session } } = await client.auth.getSession();
          if (session) {
            localStorage.setItem('auth_token', session.access_token);
            localStorage.setItem('auth_user', JSON.stringify({ id: session.user.id, email: session.user.email }));
            window.location.replace('/');
          }
        }
      } catch (e) {
        document.getElementById('oauth-section').style.display = 'none';
      }
    }

    async function signInWithProvider(provider) {
      try {
        const client = await _getSupabaseClient();
        if (!client) return;
        await client.auth.signInWithOAuth({
          provider,
          options: { redirectTo: window.location.origin + '/login' },
        });
      } catch (e) {
        const errEl = document.getElementById('login-error');
        errEl.textContent = `OAuth error: ${e.message}`;
        errEl.style.display = 'block';
      }
    }

    // If already logged in, skip to the app.
    if (localStorage.getItem('auth_token')) {
      window.location.replace('/');
    } else {
      _initOAuth();
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || 'Login failed.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        window.location.replace('/');
      } catch (err) {
        errEl.textContent = 'Network error. Is the backend running?';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>

</html>
